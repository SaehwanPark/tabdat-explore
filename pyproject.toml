[project]
name = "tabdat-eda-dev"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "duckdb>=1.4.3",
]

[project.scripts]
tabdat = "tabdat.cli:main"

[dependency-groups]
dev = [
    "mypy>=1.20.2",
    "pytest>=9.0.1",
    "ruff>=0.15.12",
]

[tool.ruff]
indent-width = 2
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]

[tool.ruff.format]
indent-style = "space"
line-ending = "lf"

[tool.hatch.build.targets.wheel]
packages = ["src/tabdat"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
